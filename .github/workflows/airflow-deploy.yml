name: Airflow Deploy

on:
  workflow_run:
    workflows: ["CI/CD"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  TF_IN_AUTOMATION: "true"

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER_ID }}
          service_account: tf-apply-sa@${{ secrets.TF_VAR_PROJECT_ID }}.iam.gserviceaccount.com

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Capture previous Airflow image
        id: previous
        run: |
          previous="ghcr.io/apache/airflow:2.10.4"
          echo "image=$previous" >> "$GITHUB_OUTPUT"

      - name: Build image metadata
        id: image
        run: |
          image="ghcr.io/${{ github.repository }}/airflow:${{ github.sha }}"
          echo "image=$image" >> "$GITHUB_OUTPUT"

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Airflow image
        uses: docker/build-push-action@v5
        with:
          file: ./docker/airflow/Dockerfile
          push: true
          tags: ${{ steps.image.outputs.image }},ghcr.io/${{ github.repository }}/airflow:latest

      - name: Terraform Init
        run: terraform -chdir=terraform init -backend-config="bucket=${{ secrets.TF_VAR_state_bucket }}"

      - name: Terraform Apply (deploy)
        run: |
          terraform -chdir=terraform apply -auto-approve \
            -var="project_id=${{ secrets.TF_VAR_PROJECT_ID }}" \
            -var="state_bucket=${{ secrets.TF_VAR_state_bucket }}" \
            -var="region=${{ secrets.TF_VAR_REGION }}" \
            -var="zone=us-east1-b" \
            -var="environment=prod" \
            -var="airflow_image=${{ steps.image.outputs.image }}"

      - name: Install PostgreSQL client and Cloud SQL Auth Proxy
        run: |
          sudo apt-get update -y
          sudo apt-get install -y postgresql-client
          curl -sSL -o cloud-sql-proxy \
            https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.1/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy

      - name: Apply ticketforge schema init scripts
        run: |
          set -euo pipefail

          connection_name=$(terraform -chdir=terraform output -raw cloud_sql_instance_connection_name)
          db_name=$(terraform -chdir=terraform output -raw cloud_sql_ticketforge_database_name)
          db_user=$(terraform -chdir=terraform output -raw cloud_sql_ticketforge_database_user)
          db_password=$(gcloud secrets versions access latest --secret="ticketforge-db-password-prod")

          ./cloud-sql-proxy "$connection_name" --address 127.0.0.1 --port 5432 &
          proxy_pid=$!
          trap 'kill "$proxy_pid" 2>/dev/null || true' EXIT

          # Wait for proxy to accept connections before applying SQL files.
          for _ in $(seq 1 30); do
            if PGPASSWORD="$db_password" psql -h 127.0.0.1 -U "$db_user" -d "$db_name" -c 'SELECT 1;' >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          for sql in \
            scripts/postgres/init/01_extensions.sql \
            scripts/postgres/init/02_schema.sql \
            scripts/postgres/init/03_auth.sql \
            scripts/postgres/init/04_projects.sql \
            scripts/postgres/init/05_project_tickets.sql; do
            echo "Applying ${sql}"
            PGPASSWORD="$db_password" psql \
              -v ON_ERROR_STOP=1 \
              -h 127.0.0.1 \
              -U "$db_user" \
              -d "$db_name" \
              -f "$sql"
          done

      - name: Trigger VM restart to apply new image
        run: |
          vm_name=$(terraform -chdir=terraform output -raw airflow_vm_instance_name 2>/dev/null || echo "airflow-vm-prod")
          zone="us-east1-b"
          echo "Stopping VM to apply new image..."
          gcloud compute instances stop "$vm_name" --zone="$zone" --quiet || true
          sleep 5
          echo "Starting VM with new configuration..."
          gcloud compute instances start "$vm_name" --zone="$zone" --quiet
          echo "Waiting for VM startup script to complete (30 seconds)..."
          sleep 30

      - name: Export Terraform outputs
        id: tfout
        run: |
          terraform -chdir=terraform output -json > terraform_outputs.json
          airflow_url=$(jq -r '.airflow_webserver_url.value' terraform_outputs.json)
          echo "airflow_url=$airflow_url" >> "$GITHUB_OUTPUT"

      - name: Smoke test
        run: |
          vm_name="airflow-vm-prod"
          zone="us-east1-b"
          echo "Creating IAP tunnel to private VM for smoke test..."
          gcloud compute start-iap-tunnel "$vm_name" 8080 \
            --local-host-port=localhost:8080 \
            --zone="$zone" \
            --quiet &
          tunnel_pid=$!
          sleep 2
          bash scripts/ci/airflow_smoketest.sh "http://localhost:8080" || exit_code=$?
          kill $tunnel_pid 2>/dev/null || true
          exit ${exit_code:-0}

      - name: Store known-good image
        if: success()
        run: echo "AIRFLOW_PREVIOUS_IMAGE=${{ steps.image.outputs.image }}" >> "$GITHUB_ENV"

      - name: Rollback on smoke failure
        if: failure()
        run: |
          echo "Smoke test failed. Rolling back to previous image..."
          terraform -chdir=terraform apply -auto-approve \
            -var="project_id=${{ secrets.TF_VAR_PROJECT_ID }}" \
            -var="state_bucket=${{ secrets.TF_VAR_state_bucket }}" \
            -var="region=${{ secrets.TF_VAR_REGION }}" \
            -var="zone=us-east1-b" \
            -var="environment=prod" \
            -var="airflow_image=${{ steps.previous.outputs.image }}"

          vm_name="airflow-vm-prod"
          zone="us-east1-b"
          echo "Restarting VM with rolled back image..."
          gcloud compute instances stop "$vm_name" --zone="$zone" --quiet || true
          sleep 5
          gcloud compute instances start "$vm_name" --zone="$zone" --quiet
          sleep 30

      - name: Re-smoke after rollback
        if: failure()
        run: |
          vm_name="airflow-vm-prod"
          zone="us-east1-b"
          echo "Testing rollback with IAP tunnel..."
          gcloud compute start-iap-tunnel "$vm_name" 8080 \
            --local-host-port=localhost:8080 \
            --zone="$zone" \
            --quiet &
          tunnel_pid=$!
          sleep 2
          bash scripts/ci/airflow_smoketest.sh "http://localhost:8080" || exit_code=$?
          kill $tunnel_pid 2>/dev/null || true
          exit ${exit_code:-0}
