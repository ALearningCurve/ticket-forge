name: Airflow Deploy

on:
  workflow_run:
    workflows: ["CI/CD"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  TF_IN_AUTOMATION: "true"
  TF_VAR_project_id: ${{ secrets.TF_VAR_PROJECT_ID || secrets.TF_VAR_project_id }}
  TF_VAR_state_bucket: ${{ secrets.TF_VAR_STATE_BUCKET || secrets.TF_VAR_state_bucket }}
  TF_VAR_region: ${{ secrets.TF_VAR_REGION || secrets.TF_VAR_region }}
  TF_VAR_zone: us-east1-b
  TF_VAR_environment: prod

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Resolve Airflow repo ref
        id: repo_ref
        run: |
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            echo "value=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER_ID }}
          service_account: tf-apply-sa@${{ env.TF_VAR_project_id }}.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Validate required deployment secrets
        run: |
          : "${{ secrets.GITHUB_TOKEN || '' }}"
          : "${{ secrets.GMAIL_APP_USERNAME || '' }}"
          : "${{ secrets.GMAIL_APP_PASSWORD || '' }}"

      - name: Terraform Init
        run: terraform -chdir=terraform init -backend-config="bucket=${TF_VAR_state_bucket}"

      - name: Import existing runtime secrets (if present)
        run: |
          set -euo pipefail

          github_token_secret_id="${TF_VAR_airflow_github_token_secret_id:-airflow-github-token-prod}"
          gmail_username_secret_id="${TF_VAR_airflow_gmail_app_username_secret_id:-airflow-gmail-app-username-prod}"
          gmail_password_secret_id="${TF_VAR_airflow_gmail_app_password_secret_id:-airflow-gmail-app-password-prod}"

          if gcloud secrets describe "${github_token_secret_id}" --project="${TF_VAR_project_id}" >/dev/null 2>&1; then
            terraform -chdir=terraform import \
              -var="project_id=${TF_VAR_project_id}" \
              -var="state_bucket=${TF_VAR_state_bucket}" \
              -var="region=${TF_VAR_region}" \
              -var="zone=${TF_VAR_zone}" \
              -var="environment=${TF_VAR_environment}" \
              'google_secret_manager_secret.airflow_runtime["github_token"]' \
              "projects/${TF_VAR_project_id}/secrets/${github_token_secret_id}" >/dev/null 2>&1 || true
          fi

          if gcloud secrets describe "${gmail_username_secret_id}" --project="${TF_VAR_project_id}" >/dev/null 2>&1; then
            terraform -chdir=terraform import \
              -var="project_id=${TF_VAR_project_id}" \
              -var="state_bucket=${TF_VAR_state_bucket}" \
              -var="region=${TF_VAR_region}" \
              -var="zone=${TF_VAR_zone}" \
              -var="environment=${TF_VAR_environment}" \
              'google_secret_manager_secret.airflow_runtime["gmail_app_username"]' \
              "projects/${TF_VAR_project_id}/secrets/${gmail_username_secret_id}" >/dev/null 2>&1 || true
          fi

          if gcloud secrets describe "${gmail_password_secret_id}" --project="${TF_VAR_project_id}" >/dev/null 2>&1; then
            terraform -chdir=terraform import \
              -var="project_id=${TF_VAR_project_id}" \
              -var="state_bucket=${TF_VAR_state_bucket}" \
              -var="region=${TF_VAR_region}" \
              -var="zone=${TF_VAR_zone}" \
              -var="environment=${TF_VAR_environment}" \
              'google_secret_manager_secret.airflow_runtime["gmail_app_password"]' \
              "projects/${TF_VAR_project_id}/secrets/${gmail_password_secret_id}" >/dev/null 2>&1 || true
          fi

      - name: Publish runtime secret versions
        env:
          GITHUB_TOKEN_AIRFLOW: ${{ secrets.GITHUB_TOKEN }}
          GMAIL_APP_USERNAME: ${{ secrets.GMAIL_APP_USERNAME }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          set -euo pipefail

          github_token_secret_id="${TF_VAR_airflow_github_token_secret_id:-airflow-github-token-prod}"
          gmail_username_secret_id="${TF_VAR_airflow_gmail_app_username_secret_id:-airflow-gmail-app-username-prod}"
          gmail_password_secret_id="${TF_VAR_airflow_gmail_app_password_secret_id:-airflow-gmail-app-password-prod}"

          printf '%s' "${GITHUB_TOKEN_AIRFLOW}" | gcloud secrets versions add "${github_token_secret_id}" --project="${TF_VAR_project_id}" --data-file=-
          printf '%s' "${GMAIL_APP_USERNAME}" | gcloud secrets versions add "${gmail_username_secret_id}" --project="${TF_VAR_project_id}" --data-file=-
          printf '%s' "${GMAIL_APP_PASSWORD}" | gcloud secrets versions add "${gmail_password_secret_id}" --project="${TF_VAR_project_id}" --data-file=-

      - name: Terraform Apply (deploy Airflow VM)
        run: |
          terraform -chdir=terraform apply -auto-approve \
            -var="project_id=${TF_VAR_project_id}" \
            -var="state_bucket=${TF_VAR_state_bucket}" \
            -var="region=${TF_VAR_region}" \
            -var="zone=${TF_VAR_zone}" \
            -var="environment=${TF_VAR_environment}" \
            -var="airflow_repo_ref=${{ steps.repo_ref.outputs.value }}"

      - name: Install PostgreSQL client and Cloud SQL Auth Proxy
        run: |
          sudo apt-get update -y
          sudo apt-get install -y postgresql-client
          curl -sSL -o cloud-sql-proxy \
            https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.1/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy

      - name: Apply ticketforge schema init scripts
        run: just gcp-ticketforge-schema-init

      - name: Smoke test
        run: |
          airflow_url=$(terraform -chdir=terraform output -raw airflow_webserver_url)
          bash scripts/ci/airflow_smoketest.sh "${airflow_url}"
